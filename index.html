<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-CAP · Footprint Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1DBF73;--green-dim:#17A362;--green-sub:rgba(29,191,115,.08);
  --border-green:rgba(29,191,115,.28);
  --fd:'Syncopate',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:4px;--rm:8px;
}
body{font-family:var(--fb);font-size:15px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}
body.dark{background:#0A0A0A;color:#fff;--bg:#0A0A0A;--sur:#111;--sur2:#1A1A1A;--sur3:#252525;--tx:#fff;--tx2:#AAA;--tx3:#888;--tx4:#555;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15)}
body.light{background:#F5F5F2;color:#0a0a0a;--bg:#F5F5F2;--sur:#fff;--sur2:#F0EEE8;--sur3:#E2DFD8;--tx:#0a0a0a;--tx2:#333;--tx3:#666;--tx4:#999;--bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.18)}
/* HEADER */
#hdr{border-bottom:1px solid var(--bd);padding:14px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.hlogo{display:flex;align-items:center;gap:14px}.hlogo img{display:block;flex-shrink:0;height:34px}
.hsep{width:1px;height:24px;background:var(--bd2)}
.htitle{font-family:var(--fd);font-size:9px;letter-spacing:.2em;color:var(--tx3);text-transform:uppercase}
.hright{display:flex;align-items:center;gap:14px}
.hsave{font-family:var(--fm);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.theme-btn{background:var(--sur2);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;cursor:pointer;font-family:var(--fm);font-size:11px;color:var(--tx3);transition:all .15s}
.theme-btn:hover{border-color:var(--green);color:var(--green)}
/* PROGRESS */
#prog{height:2px;background:var(--sur2)}
#prog-fill{height:100%;background:var(--green);transition:width .4s ease;width:0%}
/* MAIN */
#main{max-width:800px;margin:0 auto;padding:48px 40px;width:100%}
/* TYPOGRAPHY */
.eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.15em;color:var(--green);text-transform:uppercase;margin-bottom:24px}
.page-title{font-family:var(--fd);font-size:clamp(20px,4vw,32px);font-weight:700;line-height:1.15;letter-spacing:.02em;margin-bottom:20px}
.page-title span{color:var(--green)}
.page-desc{font-size:15px;color:var(--tx2);line-height:1.75;max-width:560px;margin-bottom:40px}
.sec-label{font-family:var(--fm);font-size:11px;letter-spacing:.15em;color:var(--tx3);text-transform:uppercase;margin-bottom:20px}
/* FIELDS */
.fields-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:40px}
.field-wrap{flex:1;min-width:210px}
.field-label{display:block;font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.field-input{width:100%;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--fb);font-size:15px;padding:12px 16px;outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--green)}
.field-input::placeholder{color:var(--tx4)}
/* AREA CARDS */
.areas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:40px}
.area-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rm);padding:20px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none;position:relative}
.area-card:hover{border-color:rgba(29,191,115,.3)}
.area-card.sel{border-color:var(--green);background:var(--green-sub)}
.area-card.sel::after{content:"✓";position:absolute;top:12px;right:14px;font-size:12px;color:var(--green);font-family:var(--fm)}
.a-icon{font-size:22px;margin-bottom:10px}
.a-name{font-family:var(--fd);font-size:11px;letter-spacing:.08em;font-weight:700;margin-bottom:4px}
.a-scope{font-family:var(--fm);font-size:10px;color:var(--green);margin-bottom:8px}
.a-desc{font-size:12px;color:var(--tx3);line-height:1.5}
/* STEP DOTS */
.step-ind{display:flex;gap:6px;margin-bottom:36px}
.step-dot{height:3px;flex:1;background:var(--sur3);border-radius:2px;transition:background .3s}
.step-dot.done{background:var(--green)}
.step-dot.active{background:rgba(29,191,115,.4)}
/* AREA HEADER */
.area-hdr{display:flex;align-items:center;gap:14px;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.area-hdr-icon{font-size:28px}
.area-hdr-name{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.06em;margin-bottom:3px}
.area-hdr-scope{font-family:var(--fm);font-size:11px;color:var(--green)}
.area-hdr-prog{font-family:var(--fm);font-size:11px;color:var(--tx3);margin-left:auto}
/* QUESTIONS */
.q-block{margin-bottom:28px}
.q-text{font-size:14px;color:var(--tx2);margin-bottom:12px;line-height:1.6}
.q-text.drill{margin-left:20px;padding-left:14px;border-left:2px solid var(--green-dim);color:var(--tx3);font-size:13px}
.opt-badge{display:inline-block;font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--tx4);text-transform:uppercase;margin-left:8px}
/* YESNO */
.yn-group{display:flex;gap:10px}
.yn-btn{padding:10px 28px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);font-family:var(--fm);font-size:12px;letter-spacing:.08em;cursor:pointer;transition:all .15s}
.yn-btn:hover{border-color:var(--bd2)}
.yn-btn.on{background:var(--green-sub);border-color:var(--green);color:var(--green)}
/* MULTISELECT */
.ms-group{display:flex;flex-wrap:wrap;gap:8px}
.ms-btn{padding:8px 16px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sur2);color:var(--tx2);font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .15s}
.ms-btn:hover{border-color:var(--bd2)}
.ms-btn.on{background:var(--green-sub);border-color:var(--green);color:var(--green)}
.other-wrap{margin-top:8px}
/* SELECT */
.field-select{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--fb);font-size:14px;padding:11px 16px;outline:none;min-width:200px;-webkit-appearance:none;cursor:pointer}
.field-select:focus{border-color:var(--green)}
/* NUMBER */
.num-wrap{display:flex;align-items:center;gap:10px}
.field-num{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:14px;padding:11px 16px;outline:none;width:180px}
.field-num:focus{border-color:var(--green)}
.field-unit{font-family:var(--fm);font-size:12px;color:var(--tx3)}
/* TEXTAREA */
.field-ta{width:100%;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--fb);font-size:14px;padding:12px 16px;outline:none;resize:vertical;min-height:90px;line-height:1.6}
.field-ta:focus{border-color:var(--green)}
.field-ta::placeholder{color:var(--tx4)}
/* UPLOAD */
.q-star{color:#1DBF73;font-weight:700;margin-right:3px}
.upload-section{margin-top:32px;padding:22px;border:1px solid var(--bd);border-radius:var(--rm);background:var(--sur)}
.upload-title{font-family:var(--fm);font-size:11px;letter-spacing:.12em;color:var(--tx3);text-transform:uppercase;margin-bottom:14px}
.upload-zone{border:1px dashed var(--bd2);border-radius:var(--rm);padding:22px;text-align:center;cursor:pointer;transition:all .15s;display:block;position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--green);background:var(--green-sub)}
.upload-zone input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.up-icon{font-size:22px;color:var(--tx4);margin-bottom:6px}
.up-text{font-size:13px;color:var(--tx3)}
.up-text span{color:var(--green)}
.up-hint{font-size:11px;color:var(--tx4);margin-top:4px}
.file-list{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.file-pill{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:6px 12px;font-family:var(--fm);font-size:11px;color:var(--tx2)}
.file-rm{background:none;border:none;color:var(--tx4);cursor:pointer;font-size:16px;line-height:1;padding:0}
.file-rm:hover{color:#ff5555}
.upload-note{font-size:12px;color:var(--tx4);margin-top:10px;line-height:1.5}
/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:28px;border-top:1px solid var(--bd)}
.btn{font-family:var(--fd);font-size:10px;letter-spacing:.15em;font-weight:700;padding:13px 28px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-pri{background:var(--green);color:#000}
.btn-pri:hover{background:var(--green-dim)}
.btn-pri:disabled{opacity:.35;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--tx3);border:1px solid var(--bd)}
.btn-sec:hover{color:var(--tx);border-color:var(--bd2)}
.btn-out{background:transparent;border:1px solid var(--bd);color:var(--tx2);font-family:var(--fd);font-size:10px;letter-spacing:.12em;padding:12px 22px;border-radius:var(--r);cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-out:hover{border-color:var(--bd2);color:var(--tx)}
.area-nav-icons{display:flex;align-items:center;gap:8px}
.area-nav-icon{font-size:18px;cursor:pointer;transition:opacity .15s}
/* SUMMARY */
.sum-eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.15em;color:var(--green);text-transform:uppercase;margin-bottom:20px}
.sum-title{font-family:var(--fd);font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:.03em;margin-bottom:8px}
.sum-hotel{font-size:13px;color:var(--tx3);margin-bottom:40px;font-family:var(--fm)}
.sum-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:36px}
.sum-tab{padding:12px 24px;font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--tx4);border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none}
.sum-tab:hover{color:var(--tx2)}
.sum-tab.on{color:var(--green);border-bottom-color:var(--green)}
.cli-intro{background:var(--sur);border:1px solid var(--border-green);border-radius:var(--rm);padding:24px 28px;margin-bottom:32px}
.cli-intro-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.15em;color:var(--green);text-transform:uppercase;margin-bottom:10px}
.cli-intro-txt{font-size:15px;color:var(--tx2);line-height:1.7}
.sum-area-block{margin-bottom:24px;border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden}
.sum-area-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--sur2);border-bottom:1px solid var(--bd)}
.sum-area-icon{font-size:18px}
.sum-area-name{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em}
.sum-area-scope{font-family:var(--fm);font-size:10px;color:var(--green);margin-left:auto}
.sum-area-body{padding:20px;background:var(--sur)}
.sum-qa-row{display:flex;gap:16px;margin-bottom:12px;font-size:13px}
.sum-q{color:var(--tx3);min-width:190px;max-width:190px;line-height:1.5}
.sum-a{color:var(--tx);flex:1;line-height:1.5}
.sum-a-empty{color:var(--tx4);font-style:italic;flex:1;line-height:1.5}
/* TECH */
.tech-sec{margin-bottom:32px}
.tech-sec-title{font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.tech-tbl{width:100%;border-collapse:collapse}
.tech-tbl td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--bd);vertical-align:top}
.tech-tbl tr:last-child td{border-bottom:none}
.tech-tbl td:first-child{color:var(--tx3);font-family:var(--fm);width:48%}
.tech-tbl td:last-child{color:var(--tx);font-size:13px}
.doc-list{list-style:none}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;border-bottom:1px solid var(--bd);color:var(--tx2)}
.doc-item:last-child{border-bottom:none}
.doc-area-tag{font-family:var(--fm);font-size:10px;color:var(--tx4);margin-left:auto;margin-right:10px}
.doc-dl-btn{background:none;border:1px solid var(--bd);border-radius:var(--r);padding:5px 12px;font-family:var(--fm);font-size:11px;color:var(--green);cursor:pointer;transition:all .15s;flex-shrink:0}
.doc-dl-btn:hover{background:var(--green-sub);border-color:var(--green)}
.status-badge{display:inline-flex;font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:.08em}
.s-ok{background:rgba(29,191,115,.1);color:var(--green)}
.s-partial{background:rgba(255,180,0,.1);color:#FFB400}
.s-missing{background:rgba(255,80,80,.1);color:#FF5555}
.export-row{display:flex;gap:12px;margin-top:36px;padding-top:24px;border-top:1px solid var(--bd);flex-wrap:wrap}
.note-txt{font-size:12px;color:var(--tx4);margin-top:12px;line-height:1.6}
@media print{#hdr,.nav-row,.export-row,.sum-tabs,#prog{display:none!important}#main{padding:20px}}
</style>
</head>

// ─── INDEXEDDB FOR FILES ──────────────────────────────────────────────────────
let idb=null;
function openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open("gcap_files",1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("files"))
        db.createObjectStore("files",{keyPath:"id"});
    };
    req.onsuccess=e=>{idb=e.target.result;res(idb);};
    req.onerror=e=>rej(e);
  });
}
function idbGetAll(){
  return new Promise((res,rej)=>{
    const tx=idb.transaction("files","readonly");
    const req=tx.objectStore("files").getAll();
    req.onsuccess=e=>res(e.target.result||[]);
    req.onerror=e=>rej(e);
  });
}
function idbPut(record){
  return new Promise((res,rej)=>{
    const tx=idb.transaction("files","readwrite");
    const req=tx.objectStore("files").put(record);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}
function idbDelete(id){
  return new Promise((res,rej)=>{
    const tx=idb.transaction("files","readwrite");
    const req=tx.objectStore("files").delete(id);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}
function idbClear(){
  return new Promise((res,rej)=>{
    const tx=idb.transaction("files","readwrite");
    const req=tx.objectStore("files").clear();
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}

// ─── LOCALSTORAGE FOR ANSWERS ─────────────────────────────────────────────────
function loadState(){
  try{const r=localStorage.getItem(SK);if(r)S=JSON.parse(r);}catch(e){}
}
function saveState(){
  try{
    S.savedAt=new Date().toISOString();
    localStorage.setItem(SK,JSON.stringify(S));
    const t=new Date(S.savedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const lbl=document.getElementById("save-label");
    if(lbl)lbl.textContent="Saved "+t;
  }catch(e){
    const lbl=document.getElementById("save-label");
    if(lbl)lbl.textContent="Save error";
  }
}
let saveTimer=null;
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,600);}

function applyTheme(){
  document.body.className=S.theme;
  const btn=document.querySelector(".theme-btn");
  if(btn) btn.textContent=S.theme==="dark"?"☀ Light":"☾ Dark";
  const logo=document.getElementById("gcap-logo");
  if(logo){
    logo.src=S.theme==="dark"?LOGO_DARK:LOGO_LIGHT;
    logo.style.height="34px";
    logo.style.display="block";
  }
}
function toggleTheme(){S.theme=S.theme==="dark"?"light":"dark";applyTheme();queueSave();}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function visible(q){
  if(!q.dep)return true;
  const v=S.ans[q.dep.id];
  return Array.isArray(v)?v.includes(q.dep.val):v===q.dep.val;
}
function fmtVal(qid){
  const v=S.ans[qid];
  if(!v||(Array.isArray(v)&&!v.length))return null;
  if(Array.isArray(v)){
    const p=[...v];
    if(v.includes("Other")&&S.ans[qid+"_other"])p[p.indexOf("Other")]="Other: "+S.ans[qid+"_other"];
    return p.join(", ");
  }
  return String(v);
}
function setProgress(pct){const f=document.getElementById("prog-fill");if(f)f.style.width=pct+"%";}
function el(tag,cls,children){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return e;
}
function setAttr(e,attrs){Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;}

async function downloadFile(file){
  const blob=new Blob([file.data],{type:file.type||"application/octet-stream"});

  // Try File System Access API (Chrome/Edge) — lets user pick save location
  if(window.showSaveFilePicker){
    try{
      const ext=file.name.split(".").pop();
      const mimeMap={
        pdf:"application/pdf",xlsx:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        xls:"application/vnd.ms-excel",csv:"text/csv",
        doc:"application/msword",docx:"application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        png:"image/png",jpg:"image/jpeg",jpeg:"image/jpeg"
      };
      const handle=await window.showSaveFilePicker({
        suggestedName:file.name,
        types:[{
          description:"File",
          accept:{[mimeMap[ext]||"application/octet-stream"]:["." + ext]}
        }]
      });
      const writable=await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    }catch(e){
      if(e.name==="AbortError")return; // user cancelled picker
      // fall through to classic download
    }
  }

  // Fallback: classic <a> download (Firefox, Safari)
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=file.name;a.style.display="none";
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
}

// ─── RENDER ENGINE ────────────────────────────────────────────────────────────
function render(){
  const main=document.getElementById("main");
  main.innerHTML="";
  applyTheme();
  if(S.screen==="intro")   renderIntro(main);
  else if(S.screen==="q")  renderQ(main);
  else if(S.screen==="sum")renderSum(main);
}

// ─── INTRO ───────────────────────────────────────────────────────────────────
function renderIntro(main){
  setProgress(0);
  const hotelInput=document.createElement("input");
  hotelInput.className="field-input"; hotelInput.type="text"; hotelInput.placeholder="e.g. Skotel Den Haag";
  hotelInput.value=S.hotel;
  hotelInput.addEventListener("input",()=>{S.hotel=hotelInput.value;queueSave();});

  const assessorInput=document.createElement("input");
  assessorInput.className="field-input"; assessorInput.type="text"; assessorInput.placeholder="Name of interviewer";
  assessorInput.value=S.assessor;
  assessorInput.addEventListener("input",()=>{S.assessor=assessorInput.value;queueSave();});

  const grid=el("div","areas-grid");
  AREAS.forEach(a=>{
    const card=el("div","area-card"+(S.selAreas.includes(a.id)?" sel":""));
    card.innerHTML=`<div class="a-icon">${a.icon}</div><div class="a-name">${a.label}</div><div class="a-scope">${a.scope}</div><div class="a-desc">${a.desc}</div>`;
    card.addEventListener("click",()=>{
      S.selAreas=S.selAreas.includes(a.id)?S.selAreas.filter(x=>x!==a.id):[...S.selAreas,a.id];
      queueSave();render();
    });
    grid.appendChild(card);
  });

  const startBtn=el("button","btn btn-pri","Begin Assessment →");
  startBtn.disabled=S.selAreas.length===0;
  startBtn.addEventListener("click",()=>{S.areaIdx=0;S.screen="q";queueSave();render();});

  const hw=el("div","field-wrap");hw.appendChild(el("label","field-label","Property name"));hw.appendChild(hotelInput);
  const aw=el("div","field-wrap");aw.appendChild(el("label","field-label","Assessor"));aw.appendChild(assessorInput);
  const fr=el("div","fields-row",[hw,aw]);
  const nav=el("div","nav-row",[el("div",null),startBtn]);

  main.append(
    el("div","eyebrow","G-CAP · Hotel Assessment Tool"),
    el("h1","page-title","Map your hotel's environmental footprint"),
    el("p","page-desc","This assessment identifies the data sources and emission categories relevant to your property — the first step towards accurate GHG accounting under Scope 1, 2, and 3 frameworks."),
    fr,
    el("div","sec-label","Select emission areas to assess"),
    grid,nav
  );
}

// ─── QUESTIONNAIRE ────────────────────────────────────────────────────────────
function renderQ(main){
  const steps=[...S.selAreas,"closing"];
  const isClosing=S.areaIdx===S.selAreas.length;
  const curId=isClosing?"closing":S.selAreas[S.areaIdx];
  const curArea=AREAS.find(a=>a.id===curId);
  const curQs=isClosing?CLOSING:(QUESTIONS[curId]||[]);
  setProgress(Math.round((S.areaIdx/steps.length)*100));

  // Step dots
  const dots=el("div","step-ind");
  steps.forEach((_,i)=>{dots.appendChild(el("div","step-dot"+(i<S.areaIdx?" done":i===S.areaIdx?" active":"")));});

  // Area header
  const aHdr=el("div","area-hdr");
  aHdr.innerHTML=`<div class="area-hdr-icon">${isClosing?"📋":curArea.icon}</div><div><div class="area-hdr-name">${isClosing?"General Information":curArea.label}</div><div class="area-hdr-scope">${isClosing?"Certifications & context":curArea.scope}</div></div><div class="area-hdr-prog">${S.areaIdx+1} / ${steps.length}</div>`;

  // Questions
  const qWrap=el("div",null);
  curQs.forEach(q=>{const b=renderQBlock(q);if(b)qWrap.appendChild(b);});

  // Upload
  const uploadEl=isClosing?null:renderUpload(curId);

  // Nav
  const backBtn=el("button","btn btn-sec","← Back");
  backBtn.addEventListener("click",()=>{
    if(S.areaIdx>0)S.areaIdx--;else S.screen="intro";
    queueSave();render();
  });
  const icons=el("div","area-nav-icons");
  S.selAreas.forEach((id,i)=>{
    const a=AREAS.find(x=>x.id===id);
    const ico=document.createElement("span");
    ico.className="area-nav-icon"; ico.title=a.label; ico.textContent=a.icon;
    ico.style.opacity=i===S.areaIdx?"1":"0.3";
    ico.addEventListener("click",()=>{S.areaIdx=i;queueSave();render();});
    icons.appendChild(ico);
  });
  const nextBtn=el("button","btn btn-pri",S.areaIdx===steps.length-1?"View Summary →":"Continue →");
  nextBtn.addEventListener("click",()=>{
    if(S.areaIdx<steps.length-1)S.areaIdx++;else S.screen="sum";
    queueSave();render();
  });
  const nav=el("div","nav-row",[backBtn,icons,nextBtn]);

  const kids=[dots,aHdr,qWrap];
  if(uploadEl)kids.push(uploadEl);
  kids.push(nav);
  main.append(...kids);
}

function renderQBlock(q){
  if(!visible(q))return null;
  const block=el("div","q-block");
  const qtxt=q.text.startsWith("★")?
    (()=>{const d=el("div","q-text"+(q.dep?" drill":""));
      const s=el("span","q-star","★");
      d.appendChild(s);
      d.appendChild(document.createTextNode(q.text.slice(1)));
      return d;})()
    :el("div","q-text"+(q.dep?" drill":""),q.text);
  const qt=qtxt;
  if(q.opt)qt.appendChild(el("span","opt-badge"," optional"));
  block.appendChild(qt);

  if(q.type==="yn"){
    const g=el("div","yn-group");
    ["yes","no"].forEach(o=>{
      const b=el("button","yn-btn"+(S.ans[q.id]===o?" on":""),o.toUpperCase());
      b.addEventListener("click",()=>{S.ans[q.id]=o;queueSave();render();});
      g.appendChild(b);
    });
    block.appendChild(g);
  }
  if(q.type==="ms"){
    const g=el("div","ms-group");
    const cur=Array.isArray(S.ans[q.id])?S.ans[q.id]:[];
    q.opts.forEach(o=>{
      const b=el("button","ms-btn"+(cur.includes(o)?" on":""),o);
      b.addEventListener("click",()=>{
        const prev=Array.isArray(S.ans[q.id])?S.ans[q.id]:[];
        S.ans[q.id]=prev.includes(o)?prev.filter(x=>x!==o):[...prev,o];
        queueSave();render();
      });
      g.appendChild(b);
    });
    block.appendChild(g);
    if(q.other&&cur.includes("Other")){
      const inp=document.createElement("input");
      inp.className="field-input";inp.type="text";inp.placeholder="Please specify...";
      inp.value=S.ans[q.id+"_other"]||"";
      inp.addEventListener("input",()=>{S.ans[q.id+"_other"]=inp.value;queueSave();});
      block.appendChild(el("div","other-wrap",[inp]));
    }
  }
  if(q.type==="sel"){
    const sel=document.createElement("select");
    sel.className="field-select";
    const def=document.createElement("option");def.value="";def.textContent="Select...";sel.appendChild(def);
    q.opts.forEach(o=>{
      const opt=document.createElement("option");opt.value=o;opt.textContent=o;
      if(S.ans[q.id]===o)opt.selected=true;
      sel.appendChild(opt);
    });
    sel.addEventListener("change",()=>{S.ans[q.id]=sel.value;queueSave();render();});
    block.appendChild(sel);
  }
  if(q.type==="num"){
    const wrap=el("div","num-wrap");
    const inp=document.createElement("input");
    inp.className="field-num";inp.type="number";inp.placeholder=q.ph||"";inp.value=S.ans[q.id]||"";
    inp.addEventListener("input",()=>{S.ans[q.id]=inp.value;queueSave();});
    wrap.appendChild(inp);
    if(q.unit)wrap.appendChild(el("span","field-unit",q.unit));
    block.appendChild(wrap);
  }
  if(q.type==="text"){
    const inp=document.createElement("input");
    inp.className="field-input";inp.type="text";inp.placeholder=q.ph||"";inp.value=S.ans[q.id]||"";
    inp.addEventListener("input",()=>{S.ans[q.id]=inp.value;queueSave();});
    block.appendChild(inp);
  }
  if(q.type==="ta"){
    const ta=document.createElement("textarea");
    ta.className="field-ta";ta.rows=4;ta.placeholder=q.ph||"";ta.value=S.ans[q.id]||"";
    ta.addEventListener("input",()=>{S.ans[q.id]=ta.value;queueSave();});
    block.appendChild(ta);
  }
  return block;
}

function renderUpload(areaId){
  const areaFiles=UPLOADS.filter(f=>f.areaId===areaId);
  const wrap=el("div","upload-section");
  wrap.appendChild(el("div","upload-title","📎 Supporting documents"));

  // Drop zone
  const zone=el("label","upload-zone");
  const inp=document.createElement("input");
  inp.type="file";inp.multiple=true;
  inp.accept=".pdf,.xlsx,.csv,.xls,.doc,.docx,.png,.jpg,.jpeg";

  inp.addEventListener("change",async(e)=>{
    const statusEl=wrap.querySelector(".upload-status");
    if(statusEl)statusEl.textContent="Reading files...";
    for(const f of Array.from(e.target.files)){
      const buf=await f.arrayBuffer();
      const id=areaId+"_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const record={id,name:f.name,size:f.size,type:f.type,areaId,data:buf};
      await idbPut(record);
      UPLOADS.push(record);
    }
    inp.value="";
    render();
  });

  const upIcon=document.createElement("div");upIcon.className="up-icon";upIcon.textContent="⬆";
  const upText=document.createElement("div");upText.className="up-text";
  upText.innerHTML="Drop files or <span>browse</span>";
  const upHint=document.createElement("div");upHint.className="up-hint";
  upHint.textContent="PDF, XLSX, CSV, DOCX — no size limit, stored locally";

  zone.appendChild(inp);zone.appendChild(upIcon);zone.appendChild(upText);zone.appendChild(upHint);
  wrap.appendChild(zone);

  const statusDiv=el("div","upload-status");
  wrap.appendChild(statusDiv);

  if(areaFiles.length){
    const list=el("div","file-list");
    areaFiles.forEach(f=>{
      const pill=el("div","file-pill");
      pill.appendChild(document.createTextNode("📄 "+f.name));
      const rm=el("button","file-rm","×");
      rm.addEventListener("click",async()=>{
        await idbDelete(f.id);
        UPLOADS=UPLOADS.filter(x=>x.id!==f.id);
        render();
      });
      pill.appendChild(rm);
      list.appendChild(pill);
    });
    wrap.appendChild(list);
  }
  wrap.appendChild(el("div","upload-note","Files are stored in your browser (IndexedDB) with no size limit and persist across sessions."));
  return wrap;
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
let sumTab="client";
function renderSum(main){
  setProgress(100);

  main.appendChild(el("div","sum-eyebrow","Assessment Complete"));
  main.appendChild(el("h2","sum-title","Environmental Data Summary"));
  main.appendChild(el("div","sum-hotel",(S.hotel||"Property")+(S.assessor?" · "+S.assessor:"")+" · "+new Date().toLocaleDateString()));

  const tabs=el("div","sum-tabs");
  ["client","technical"].forEach(t=>{
    const tab=el("button","sum-tab"+(sumTab===t?" on":""),t==="client"?"Client View":"Technical View");
    tab.addEventListener("click",()=>{sumTab=t;render();});
    tabs.appendChild(tab);
  });
  main.appendChild(tabs);

  if(sumTab==="client"){
    const intro=el("div","cli-intro");
    intro.innerHTML=`<div class="cli-intro-lbl">Assessment overview</div><div class="cli-intro-txt">This document summarises the environmental data collected for <strong>${S.hotel||"your property"}</strong> across ${S.selAreas.length} emission area${S.selAreas.length!==1?"s":""}. It forms the baseline for G-CAP's carbon accounting.</div>`;
    main.appendChild(intro);

    S.selAreas.forEach(aid=>{
      const a=AREAS.find(x=>x.id===aid);
      const qs=(QUESTIONS[aid]||[]).filter(q=>visible(q)&&!q.opt);
      const aFiles=UPLOADS.filter(f=>f.areaId===aid);
      const block=el("div","sum-area-block");
      const hdr=el("div","sum-area-hdr");
      hdr.innerHTML=`<span class="sum-area-icon">${a.icon}</span><span class="sum-area-name">${a.label}</span><span class="sum-area-scope">${a.scope}</span>`;
      const body=el("div","sum-area-body");
      qs.forEach(q=>{
        const row=el("div","sum-qa-row");
        row.appendChild(el("span","sum-q",q.text.replace("★","").trim()));
        const v=fmtVal(q.id);
        row.appendChild(el("span",v?"sum-a":"sum-a-empty",v||"Not provided"));
        body.appendChild(row);
      });
      if(aFiles.length){
        const row=el("div","sum-qa-row");
        row.appendChild(el("span","sum-q","Documents uploaded"));
        row.appendChild(el("span","sum-a",aFiles.map(f=>f.name).join(", ")));
        body.appendChild(row);
      }
      block.append(hdr,body);main.appendChild(block);
    });

    const cl=el("div","sum-area-block");
    const clH=el("div","sum-area-hdr");
    clH.innerHTML=`<span class="sum-area-icon">📋</span><span class="sum-area-name">General Information</span>`;
    const clB=el("div","sum-area-body");
    CLOSING.filter(q=>visible(q)&&!q.opt).forEach(q=>{
      const row=el("div","sum-qa-row");
      row.appendChild(el("span","sum-q",q.text.replace("★","").trim()));
      const v=fmtVal(q.id);
      row.appendChild(el("span",v?"sum-a":"sum-a-empty",v||"Not provided"));
      clB.appendChild(row);
    });
    cl.append(clH,clB);main.appendChild(cl);
  }

  if(sumTab==="technical"){
    // Availability
    const sec1=el("div","tech-sec");
    sec1.appendChild(el("div","tech-sec-title","Data availability by area"));
    const tbl=el("table","tech-tbl");
    const tb=el("tbody");
    S.selAreas.forEach(aid=>{
      const a=AREAS.find(x=>x.id===aid);
      const qs=(QUESTIONS[aid]||[]).filter(q=>!q.opt&&visible(q));
      const ans=qs.filter(q=>{const v=S.ans[q.id];return v&&(Array.isArray(v)?v.length:v!=="");}).length;
      const ratio=qs.length?ans/qs.length:0;
      const st=ratio>=0.8?"ok":ratio>=0.4?"partial":"missing";
      const fc=UPLOADS.filter(f=>f.areaId===aid).length;
      const tr=el("tr");tr.appendChild(el("td",null,a.icon+" "+a.label));
      const td=el("td");
      td.innerHTML=`<span class="status-badge s-${st}">${st==="ok"?"available":st}</span>${fc?` <span style="margin-left:8px;font-size:11px;color:var(--tx4)">${fc} file${fc>1?"s":""}</span>`:""}`;
      tr.appendChild(td);tb.appendChild(tr);
    });
    tbl.appendChild(tb);sec1.appendChild(tbl);main.appendChild(sec1);

    // Raw answers
    S.selAreas.forEach(aid=>{
      const a=AREAS.find(x=>x.id===aid);
      const qs=(QUESTIONS[aid]||[]).filter(q=>visible(q));
      const sec=el("div","tech-sec");
      sec.appendChild(el("div","tech-sec-title",a.icon+" "+a.label+" · "+a.scope));
      const t=el("table","tech-tbl");const tb2=el("tbody");
      qs.forEach(q=>{
        const tr=el("tr");tr.appendChild(el("td",null,q.id.toUpperCase()+" — "+q.text.replace("★","").trim()));
        const v=fmtVal(q.id);const td=el("td",null,v||"—");
        if(!v)td.style.cssText="color:var(--tx4);font-style:italic";
        tr.appendChild(td);tb2.appendChild(tr);
      });
      t.appendChild(tb2);sec.appendChild(t);main.appendChild(sec);
    });

    // Documents
    const docSec=el("div","tech-sec");
    const docHdrRow=el("div",null);
    docHdrRow.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)";
    const docTitle=el("div","tech-sec-title","📎 Uploaded documents");
    docTitle.style.margin="0;border:none;padding:0";
    docHdrRow.appendChild(docTitle);
    if(UPLOADS.length>1){
      const dlAll=el("button","doc-dl-btn","⬇ Download all");
      dlAll.addEventListener("click",async()=>{
        for(const f of UPLOADS){ await downloadFile(f); }
      });
      docHdrRow.appendChild(dlAll);
    }
    docSec.appendChild(docHdrRow);

    if(!UPLOADS.length){
      const p=el("p",null,"No documents uploaded.");
      p.style.cssText="font-size:13px;color:var(--tx4);font-style:italic";
      docSec.appendChild(p);
    } else {
      const ul=el("ul","doc-list");
      UPLOADS.forEach(f=>{
        const a=AREAS.find(x=>x.id===f.areaId);
        const li=el("li","doc-item");
        li.appendChild(document.createTextNode("📄 "+f.name));
        const tag=el("span","doc-area-tag",a?a.label:"");
        const dlBtn=el("button","doc-dl-btn","⬇ Save as…");
        dlBtn.addEventListener("click",()=>downloadFile(f));
        li.append(tag,dlBtn);ul.appendChild(li);
      });
      docSec.appendChild(ul);
      const noteText=window.showSaveFilePicker
        ?"Click «Save as…» to choose where to save each file. Files are stored locally and never leave your device."
        :"Files will be saved to your default Downloads folder. Files are stored locally and never leave your device.";
      docSec.appendChild(el("div","note-txt",noteText));
    }
    main.appendChild(docSec);

    // Closing
    const clSec=el("div","tech-sec");
    clSec.appendChild(el("div","tech-sec-title","General information"));
    const ct=el("table","tech-tbl");const ctb=el("tbody");
    CLOSING.filter(q=>visible(q)).forEach(q=>{
      const tr=el("tr");tr.appendChild(el("td",null,q.id.toUpperCase()+" — "+q.text.replace("★","").trim()));
      const v=fmtVal(q.id);const td=el("td",null,v||"—");
      if(!v)td.style.cssText="color:var(--tx4);font-style:italic";
      tr.appendChild(td);ctb.appendChild(tr);
    });
    ct.appendChild(ctb);clSec.appendChild(ct);main.appendChild(clSec);
  }

  // Export
  const expRow=el("div","export-row");
  const pdfBtn=el("button","btn btn-pri","Export PDF");
  pdfBtn.addEventListener("click",()=>window.print());
  const jsonBtn=el("button","btn-out","Export JSON");
  jsonBtn.addEventListener("click",()=>{
    const data={hotel:S.hotel,assessor:S.assessor,date:new Date().toISOString(),selAreas:S.selAreas,ans:S.ans,files:UPLOADS.map(f=>({name:f.name,size:f.size,type:f.type,areaId:f.areaId}))};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="gcap-"+(S.hotel||"hotel").replace(/\s+/g,"-").toLowerCase()+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });
  const editBtn=el("button","btn-out","← Edit Answers");
  editBtn.addEventListener("click",()=>{S.screen="q";queueSave();render();});
  const resetBtn=el("button","btn-out","Reset");
  resetBtn.style.cssText="margin-left:auto;color:var(--tx4);border-color:transparent";
  resetBtn.addEventListener("click",async()=>{
    if(!confirm("Reset all data and start over?"))return;
    localStorage.removeItem(SK);
    await idbClear();
    UPLOADS=[];
    S={theme:S.theme,hotel:"",assessor:"",selAreas:[],areaIdx:0,ans:{},screen:"intro",savedAt:null};
    sumTab="client";render();
  });
  expRow.append(pdfBtn,jsonBtn,editBtn,resetBtn);
  main.appendChild(expRow);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot(){
  loadState();
  applyTheme();
  await openIDB();
  UPLOADS=await idbGetAll();
  render();
}
boot();
